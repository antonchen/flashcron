name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Run CI
    uses: ./.github/workflows/ci.yml

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: flashcron-linux-x86_64
            ext: tar.gz

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: flashcron-linux-x86_64-musl
            ext: tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: flashcron-linux-aarch64
            ext: tar.gz

          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            name: flashcron-macos-x86_64
            ext: tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            name: flashcron-macos-aarch64
            ext: tar.gz

          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: flashcron-windows-x86_64
            ext: zip

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: contains(matrix.target, 'aarch64') || contains(matrix.target, 'musl')
        run: cargo install cross

      - name: Build binary
        run: |
          if [ "${{ contains(matrix.target, 'aarch64') || contains(matrix.target, 'musl') }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Prepare asset
        run: |
          mkdir -p staging
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/flashcron.exe staging/
            cd staging && 7z a ../${{ matrix.name }}.${{ matrix.ext }} *
          else
            cp target/${{ matrix.target }}/release/flashcron staging/
            cp LICENSE staging/
            cp README.md staging/
            cd staging && tar czf ../${{ matrix.name }}.${{ matrix.ext }} *
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.${{ matrix.ext }}

  release:
    name: Create GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flashcron-*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    name: Build Docker Image
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Prepare binaries for Docker
        run: |
          mkdir -p binaries/amd64 binaries/arm64
          tar -xzf flashcron-linux-x86_64.tar.gz -C binaries/amd64/
          tar -xzf flashcron-linux-aarch64.tar.gz -C binaries/arm64/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.get_version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/flashcron:${{ steps.get_version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/flashcron:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
