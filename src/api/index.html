<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>FlashCron Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --animate-pulse-slow: pulse-slow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    <nav class="bg-indigo-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-3">
                    <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                    <span class="font-bold text-xl tracking-wider">FlashCron</span>
                </div>
                <div class="text-sm font-medium opacity-80" id="last-updated">Updating...</div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Stats Row -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8" id="stats-container">
            <!-- Populated by JS -->
        </div>

        <div class="flex flex-col md:flex-row gap-8">
            <!-- Jobs Table -->
            <div class="w-full md:w-2/3 bg-white rounded-lg shadow overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                    <h2 class="text-lg font-medium text-gray-900">Scheduled Jobs</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Schedule</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Next Run</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200" id="jobs-tbody">
                            <tr><td colspan="4" class="px-6 py-4 text-center text-sm text-gray-500 animate-pulse-slow">Loading jobs...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- History Panel -->
            <div class="w-full md:w-1/3 bg-white rounded-lg shadow flex flex-col h-[600px]">
                <div class="px-6 py-4 border-b border-gray-200 bg-gray-50">
                    <h2 class="text-lg font-medium text-gray-900" id="history-title">Recent History</h2>
                    <p class="text-xs text-gray-500 mt-1">Limited by <code class="bg-gray-200 px-1 rounded">job_history_size</code> (per job) and <code class="bg-gray-200 px-1 rounded">max_history_size</code> (global).</p>
                </div>
                <div class="p-0 overflow-y-auto flex-1 bg-gray-50" id="history-container">
                    <div class="p-6 text-center text-sm text-gray-500">Select a job to view history</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal for execution details -->
    <div id="modal" class="fixed inset-0 bg-gray-500/75 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-11/12 md:w-3/4 max-w-4xl max-h-[90vh] flex flex-col">
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                <h3 class="text-lg font-medium text-gray-900">Execution Logs</h3>
                <button onclick="document.getElementById('modal').classList.add('hidden')" class="text-gray-400 hover:text-gray-500">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div class="p-6 bg-gray-900 text-gray-100 font-mono text-sm overflow-y-auto flex-1 whitespace-pre-wrap" id="modal-content">
                Loading...
            </div>
        </div>
    </div>

    <script>
        let currentJob = null;

        function formatTime(isoString) {
            if (!isoString) return 'N/A';
            return new Date(isoString).toLocaleString();
        }

        function formatDuration(start, end) {
            if (!end) return 'Running...';
            const s = new Date(start), e = new Date(end);
            const ms = e - s;
            if (ms < 1000) return ms + 'ms';
            return (ms / 1000).toFixed(2) + 's';
        }

        function getStatusName(statusObj) {
            if (!statusObj) return 'Idle';
            if (typeof statusObj === 'string') return statusObj;
            return Object.keys(statusObj)[0];
        }

        async function fetchAPI(endpoint) {
            try {
                const res = await fetch(endpoint);
                return await res.json();
            } catch (err) {
                console.error(`Error fetching ${endpoint}:`, err);
                return null;
            }
        }

        async function updateDashboard() {
            const status = await fetchAPI('/api/status');
            const jobs = await fetchAPI('/api/jobs');
            
            document.getElementById('last-updated').innerText = `Updated: ${new Date().toLocaleTimeString()}`;

            if (status) {
                const sr = status.total_executions ? ((status.total_executions - status.total_failures) / status.total_executions * 100).toFixed(1) : 100;
                document.getElementById('stats-container').innerHTML = `
                    <div class="bg-white rounded-lg shadow p-6 border-t-4 border-indigo-500">
                        <div class="text-sm font-medium text-gray-500 truncate">Uptime</div>
                        <div class="mt-1 text-3xl font-semibold text-gray-900">${(status.uptime_seconds / 3600).toFixed(1)}h</div>
                    </div>
                    <div class="bg-white rounded-lg shadow p-6 border-t-4 border-blue-500">
                        <div class="text-sm font-medium text-gray-500 truncate">Active Jobs</div>
                        <div class="mt-1 text-3xl font-semibold text-gray-900">${status.enabled_jobs} <span class="text-sm text-gray-400 font-normal">/ ${status.total_jobs}</span></div>
                    </div>
                    <div class="bg-white rounded-lg shadow p-6 border-t-4 border-yellow-500">
                        <div class="text-sm font-medium text-gray-500 truncate">Running Now</div>
                        <div class="mt-1 text-3xl font-semibold text-gray-900">${status.running_jobs}</div>
                    </div>
                    <div class="bg-white rounded-lg shadow p-6 border-t-4 border-${sr < 95 ? 'red' : 'green'}-500">
                        <div class="text-sm font-medium text-gray-500 truncate">Success Rate</div>
                        <div class="mt-1 text-3xl font-semibold text-gray-900">${sr}%</div>
                    </div>
                `;
            }

            if (jobs) {
                const tbody = document.getElementById('jobs-tbody');
                tbody.innerHTML = '';
                // Sort jobs by name
                jobs.sort((a, b) => a.name.localeCompare(b.name)).forEach(job => {
                    const isRunning = job.is_running;
                    const statusName = job.last_status ? getStatusName(job.last_status) : null;
                    const statusColor = isRunning ? 'bg-blue-100 text-blue-800 border-blue-200' : 
                                      (statusName === 'Success' ? 'bg-green-100 text-green-800 border-green-200' : 
                                      (statusName ? 'bg-red-100 text-red-800 border-red-200' : 'bg-gray-100 text-gray-800 border-gray-200'));
                    const statusText = isRunning ? 'Running' : (statusName || 'Idle');
                    
                    const tr = document.createElement('tr');
                    tr.className = `hover:bg-gray-50 cursor-pointer transition-colors ${currentJob === job.name ? 'bg-indigo-50' : ''}`;
                    tr.onclick = () => loadHistory(job.name);
                    tr.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-900">${job.name}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 font-mono">${job.schedule}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2.5 py-0.5 inline-flex text-xs leading-5 font-semibold rounded-full border ${statusColor}">
                                ${statusText}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${formatTime(job.next_run)}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }
            
            if (currentJob) loadHistory(currentJob, true);
            else loadHistory(null, true); // load global history
        }

        async function loadHistory(jobName, silent = false) {
            currentJob = jobName;
            document.getElementById('history-title').innerText = jobName ? `History: ${jobName}` : 'Recent Global History';
            if (!silent) document.getElementById('history-container').innerHTML = '<div class="p-6 text-center text-sm text-gray-500 animate-pulse-slow">Loading history...</div>';
            
            const data = await fetchAPI(`/api/history${jobName ? '?job_name=' + encodeURIComponent(jobName) : ''}`);
            if (!data || !data.history) return;
            
            const container = document.getElementById('history-container');
            if (data.history.length === 0) {
                container.innerHTML = '<div class="p-6 text-center text-sm text-gray-500">No history found</div>';
                return;
            }

            container.innerHTML = '';
            data.history.forEach(h => {
                const statusName = getStatusName(h.status);
                const success = statusName === 'Success';
                const div = document.createElement('div');
                div.className = `p-4 border-b border-gray-200 hover:bg-gray-100 cursor-pointer border-l-4 ${success ? 'border-l-green-500' : 'border-l-red-500'} bg-white`;
                div.onclick = () => showLogs(h.id);
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-bold text-sm text-gray-900">${h.job_name}</span>
                        <span class="text-xs text-gray-500">${formatDuration(h.started_at, h.ended_at)}</span>
                    </div>
                    <div class="text-xs text-gray-500">${formatTime(h.started_at)}</div>
                `;
                container.appendChild(div);
            });
        }

        async function showLogs(id) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            content.innerHTML = 'Loading...';
            
            const exec = await fetchAPI(`/api/history/${id}`);
            if (exec) {
                const statusName = getStatusName(exec.status);
                let logs = `Job: ${exec.job_name}\nID: ${exec.id}\nStatus: ${statusName}\nDuration: ${formatDuration(exec.started_at, exec.ended_at)}\n`;
                
                let output = '';
                if (exec.stdout) output += exec.stdout;
                if (exec.stderr) {
                    if (output && !output.endsWith('\n')) output += '\n';
                    output += exec.stderr;
                }
                output = output.trim();
                
                logs += `\n--- OUTPUT ---\n${output || 'No output'}\n---  END ---\n`;
                
                if (exec.status.Failed && exec.status.Failed.error) {
                    logs += `\nExit Reason: ${exec.status.Failed.error}\n`;
                }
                
                content.innerText = logs;
            } else {
                content.innerText = 'Execution details not found.';
            }
        }

        // Init
        updateDashboard();
        setInterval(updateDashboard, 5000);
    </script>
</body>
</html>
